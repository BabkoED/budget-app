/* ══════════════════════════════════════════
   БЮДЖЕТ — Dark Theme (always dark)
   ══════════════════════════════════════════ */

/* ── TOKENS ─────────────────────────────── */
:root{
  --bg:     #141414;
  --card:   #1E1E1E;
  --card2:  #252525;
  --t:      #F0F0F0;
  --t2:     #B0B0B0;
  --mt:     #6B6B6B;
  --br:     #2E2E2E;
  --br2:    #383838;
  --accent: #E86A3B;
  --gd:     #30C97C;
  --rd:     #FF4F47;
  --rl:     rgba(255,79,71,.12);
  --wbg:    rgba(245,200,66,.07);
  --wbr:    rgba(245,200,66,.35);
  --sh:     0 1px 0 rgba(255,255,255,.03), 0 2px 12px rgba(0,0,0,.4);
  --sh2:    0 4px 28px rgba(0,0,0,.65);
}

/* ── RESET ───────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--t);
  font-family:'Manrope',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:inherit;color:var(--t);}
select option{background:var(--card2);}

/* ── APP ─────────────────────────────────── */
#app{min-height:100vh;padding-bottom:env(safe-area-inset-bottom,24px);}

/* ── HEADER ──────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--br);
  padding-top:env(safe-area-inset-top,0px);
}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;}
.hdr-r2{display:flex;gap:2px;padding:0 12px 10px;}

.logo{font-size:18px;font-weight:900;letter-spacing:-.4px;}
.logo span{color:var(--accent);}


/* ── HEADER RIGHT GROUP ──────────────────── */
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-left{display:flex;align-items:center;gap:10px;min-width:0;}
.cur-btn{
  font-size:12px;font-weight:800;
  padding:6px 12px;border-radius:99px;
  background:rgba(232,106,59,.15);color:var(--accent);
  white-space:nowrap;flex-shrink:0;
  border:1px solid rgba(232,106,59,.3);
  transition:opacity .15s;
}
.cur-btn:hover{opacity:.8;}
.balbtn{
  font-size:13px;font-weight:800;
  padding:7px 13px;border-radius:99px;
  display:flex;align-items:center;gap:5px;
  max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.balbtn.gd{color:var(--gd);background:rgba(48,201,124,.13);}
.balbtn.rd{color:var(--rd);background:rgba(255,79,71,.13);}
.balbtn .cv{font-size:9px;opacity:.5;}

.nb{
  font-size:13px;font-weight:700;
  padding:7px 14px;border-radius:99px;
  color:var(--mt);transition:all .15s;
  position:relative;
}
.nb.on{color:var(--t);background:var(--card);}

/* overdraft badge on tab */
.tbadge{
  position:absolute;top:5px;right:8px;
  width:7px;height:7px;border-radius:50%;
  background:var(--rd);
  border:2px solid var(--bg);
}

/* ── DROPDOWN ────────────────────────────── */
.drop{
  position:absolute;top:calc(100% + 6px);right:0;
  background:var(--card2);
  border-radius:18px;
  box-shadow:var(--sh2);
  border:1px solid var(--br2);
  min-width:240px;overflow:hidden;
  animation:fi .12s ease;z-index:200;
}
.drop-s{padding:12px 16px 5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mt);}
.drop-r{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;font-size:13px;font-weight:600;}
.drop-r label{color:var(--mt);}
.drop-item{display:block;width:100%;padding:11px 16px;text-align:left;font-size:13px;font-weight:600;border-top:1px solid var(--br);color:var(--t2);}
.drop-item.cur{color:var(--accent);}
.drop-new{display:block;width:100%;padding:12px 16px;text-align:left;font-size:13px;font-weight:700;border-top:1px solid var(--br);color:var(--accent);}
.drop-acts{display:flex;flex-direction:column;border-top:1px solid var(--br);}
.drop-act{display:block;width:100%;padding:10px 14px;text-align:left;font-size:13px;font-weight:600;color:var(--t2);}
.drop-act:hover{background:rgba(255,255,255,.04);}
.drop-act.del{color:var(--rd);}
.drop-act.del:hover{background:rgba(255,79,71,.08);}

/* ── PAGE ────────────────────────────────── */
.pg{padding:16px 14px;max-width:520px;margin:0 auto;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ptl{font-size:22px;font-weight:900;letter-spacing:-.3px;}
.mt10{margin-top:10px;}

/* ── STAT CARD (Incomes tab) ─────────────── */
.stat-card{
  background:var(--card);
  border-radius:18px;
  padding:18px 16px 14px;
  margin-bottom:12px;
  box-shadow:var(--sh);
  border:1px solid var(--br);
}

    await loadFromCloud();
    render();
  } else {
    renderAuth();
  }

  /* Слушаем авторизацию. ВАЖНО: Supabase шлёт SIGNED_IN не только
     при логине, но и при возврате на вкладку / обновлении токена.
     Поэтому грузим из облака ТОЛЬКО при первом реальном входе,
     иначе данные перезатираются и сбрасывается состояние интерфейса. */
  var authReady = !!session;
  sb.auth.onAuthStateChange(async function(event, sess) {
    if (event === 'SIGNED_IN') {
      if (authReady) return;          /* уже вошли — это просто refresh, игнор */
      authReady = true;
      currentUser = sess.user;
      await loadFromCloud();
      render();
    }
    if (event === 'SIGNED_OUT') {
      authReady = false;
      currentUser = null;
      S = {budgets:[], txs:[], activeBudgetId:null};
      authMode = 'login';
      renderAuth();
    }
  });
}

/* ── CLOUD LOAD/SAVE ──────────────────────── */
function localKey() {
  return 'budget_backup_' + (currentUser ? currentUser.id : 'anon');
}
function loadLocal() {
  try {
    var raw = localStorage.getItem(localKey());
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function saveLocal() {
  try { localStorage.setItem(localKey(), JSON.stringify(S)); } catch(e) {}
}

async function loadFromCloud() {
  var local = loadLocal();
  try {
    var res = await sb.from('user_state')
      .select('state')
      .eq('user_id', currentUser.id)
      .maybeSingle();
    if (res.error) throw res.error;
    if (res.data && res.data.state && res.data.state.budgets) {
      /* Облако содержит реальные данные — используем их, обновляем локальный бэкап */
      S = res.data.state;
      saveLocal();
    } else if (local && local.budgets && local.budgets.length) {
      /* В облаке пусто, но есть локальный бэкап — НЕ затираем, восстанавливаем
         и сразу заливаем обратно в облако */
      S = local;
      saveToCloud();
    } else {
      S = {budgets:[], txs:[], activeBudgetId:null};
    }
  } catch(e) {
    /* Сеть упала — берём локальный бэкап, не теряем данные */
    if (local && local.budgets) {
      S = local;
    } else {
      S = {budgets:[], txs:[], activeBudgetId:null};
    }
  }
}

/* ── СИНХРОНИЗАЦИЯ ─────────────────────────
   syncState: 'saved' | 'saving' | 'error' | 'offline'
   Индикатор рисуется в шапке (точка). */
var syncState = 'saved';
var pendingSave = false;

function setSync(st) {
  syncState = st;
  var dot = document.getElementById('sync-dot');
  if (dot) dot.className = 'sync-dot s-' + st;
}

/* debounced — не долбим базу на каждый символ */
function save() {
  saveLocal();                /* мгновенный локальный бэкап — не зависит от сети */
  pendingSave = true;
  setSync('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() { saveToCloud(); }, 600);
}

async function saveToCloud() {
  if (!currentUser) return;
  try {
    var res = await sb.from('user_state').upsert({
      user_id: currentUser.id,
      state: S,
      updated_at: new Date().toISOString()
    }, {onConflict: 'user_id'});
    if (res.error) throw res.error;
    saveLocal();              /* облако ок — синхронизируем локальный бэкап */
    pendingSave = false;
    setSync('saved');
  } catch(e) {
    /* Сеть/облако упали — данные уже в локальном бэкапе, не потеряются.
       Допишем при восстановлении связи (слушатель 'online'). */
    setSync(navigator.onLine ? 'error' : 'offline');
  }
}

/* BUG FIX: мгновенный сброс при закрытии вкладки.
   sendBeacon доставит данные даже после закрытия страницы. */
function flushSave() {
  if (!pendingSave || !currentUser) return;
  clearTimeout(saveTimer);
  saveLocal();   /* гарантируем локальный бэкап перед закрытием вкладки */
  try {
    var url = SUPA_URL + '/rest/v1/user_state?on_conflict=user_id';
    var payload = JSON.stringify({
      user_id: currentUser.id,
      state: S,
      updated_at: new Date().toISOString()
    });
    var blob = new Blob([payload], {type: 'application/json'});
    /* sendBeacon не умеет кастомные заголовки — поэтому fetch с keepalive */
    fetch(url, {
      method: 'POST',
      keepalive: true,
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + (sbToken() || SUPA_KEY),
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: payload
    }).catch(function(){});
    pendingSave = false;
  } catch(e) {}
}
function sbToken() {
  /* Читаем токен синхронно из localStorage — нужно для flushSave в момент
     закрытия вкладки (async getSession там не успеет отработать).
     Supabase v2 хранит сессию под ключом sb-<ref>-auth-token. */
  try {
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && (k.indexOf('-auth-token') > -1 || k.indexOf('supabase.auth') > -1)) {
        var v = JSON.parse(localStorage.getItem(k));
        if (v && v.access_token) return v.access_token;
        if (v && v.currentSession && v.currentSession.access_token) return v.currentSession.access_token;
      }
    }
  } catch(e) {}
  return null;
}
window.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') flushSave();
});
window.addEventListener('pagehide', flushSave);
window.addEventListener('online',  function(){ if(pendingSave) saveToCloud(); else setSync('saved'); });
window.addEventListener('offline', function(){ setSync('offline'); });

/* ── UTILS ───────────────────────────────────── */
function fmt(n){return new Intl.NumberFormat('ru-RU',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n))+'\u00A0₽';}
function localISO(d){
  /* Локальная дата (не UTC!) — чтобы ночные траты не падали на вчера */
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function today(){return localISO(new Date());}
function yesterday(){var d=new Date();d.setDate(d.getDate()-1);return localISO(d);}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getDays(a,b){return Math.max(1,Math.floor((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/864e5)+1);}
function daysBw(a,b){return Math.max(0,Math.floor((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/864e5));}
function lastDOM(y,m){var d=new Date(y,m+1,0).getDate();return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function firstDOM(y,m){return y+'-'+String(m+1).padStart(2,'0')+'-01';}
function fmtSh(s){return new Date(s+'T00:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short'});}
function fmtDay(s){
  var d=new Date(s+'T00:00:00'),td=today(),yd=yesterday();
  if(s===td)return 'Сегодня, '+d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  if(s===yd)return 'Вчера, '+d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
}
function pf(v){return parseFloat(String(v||'').replace(/[\u00A0\s]/g,'').replace(',','.'))||0;}
function fmtInp(el){
  var raw=el.value.replace(/[^\d.,]/g,'').replace(',','.');
  var p=raw.split('.');
  el.value=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,'\u00A0')+(p.length>1?'.'+p[1]:'');
}
function parseQA(raw){
  var s=raw.trim();
  var m=s.match(/^([\d\u00A0\s.,]+)\s*(.*)?$/);
  if(m&&pf(m[1]))return{amount:pf(m[1]),name:(m[2]||'Расход').trim()||'Расход'};
  m=s.match(/^(.*?)\s+([\d\u00A0\s.,]+)$/);
  if(m&&pf(m[2]))return{amount:pf(m[2]),name:(m[1]||'Расход').trim()||'Расход'};
  return null;
}

/* save() и load() переопределены в auth.js */
var S = {budgets:[],txs:[],activeBudgetId:null};

/* ── COMPUTED ────────────────────────────────── */
function getAB(){
  if(S.activeBudgetId){var f=S.budgets.filter(function(x){return x.id===S.activeBudgetId;});if(f.length)return f[0];}
  var t=today(),cur=S.budgets.filter(function(b){return b.dateFrom<=t&&b.dateTo>=t;});
  if(cur.length)return cur[0];
  return S.budgets.length?S.budgets[S.budgets.length-1]:null;
}

function getCurrentBudget(){
  var t=today();
  var cur=S.budgets.filter(function(b){return b.dateFrom<=t&&b.dateTo>=t;});
  return cur.length?cur[0]:null;
}
function isViewingCurrent(b){
  var cb=getCurrentBudget();
  return cb&&b&&cb.id===b.id;
}

function calcDayBal(b){
  if(!b)return 0;
  var t=today(),start=b.createdAt||b.dateFrom;
  if(t<start)return 0;
  var days=daysBw(start,t)+1,acc=b.dailyBudget*days,spent=0;
  for(var i=0;i<S.txs.length;i++){
    var tx=S.txs[i];
    if(tx.budgetId===b.id&&tx.date<=t&&!tx.plannedCatId)spent+=tx.amount;
  }
  return acc-spent;
}
function calcTotalBal(b){
  if(!b)return 0;
  var ti=0;for(var i=0;i<b.incomes.length;i++)ti+=b.incomes[i].amount;
  var spent=0,t=today();
  for(var j=0;j<S.txs.length;j++){var tx=S.txs[j];if(tx.budgetId===b.id&&tx.date<=t)spent+=tx.amount;}
  return ti-spent;
}
function calcCatRem(b,cid){
  var c=b.planned.filter(function(p){return p.id===cid;});if(!c.length)return 0;
  var spent=0;
  for(var i=0;i<S.txs.length;i++){var tx=S.txs[i];if(tx.budgetId===b.id&&tx.plannedCatId===cid)spent+=tx.amount;}
  return c[0].amount-spent;
}
function recalcDaily(b){
  var ti=0,tp=0;
  for(var i=0;i<b.incomes.length;i++)ti+=b.incomes[i].amount;
  for(var j=0;j<b.planned.length;j++)tp+=b.planned[j].amount;
  b.dailyBudget=Math.max(0,(ti-tp)/getDays(b.dateFrom,b.dateTo));
}
function hasOv(b){
  for(var i=0;i<b.planned.length;i++){if(calcCatRem(b,b.planned[i].id)<0)return true;}
  return false;
}

function rCalPop(){

  var first=new Date(y,m,1).getDay();first=first===0?6:first-1;
  var dim=new Date(y,m+1,0).getDate();
  for(var bl=0;bl<first;bl++)h+='<div></div>';

/* ── HISTORY TAB ─────────────────────────────── */
function rHistory(b){
  var txs=S.txs.filter(function(t){return t.budgetId===b.id;});
  txs.sort(function(a,c){return c.date.localeCompare(a.date);});
  var g={};
  for(var i=0;i<txs.length;i++){var tx=txs[i];if(!g[tx.date])g[tx.date]=[];g[tx.date].push(tx);}
  for(var dk in g){g[dk].sort(function(a,c){return (c.seq||0)-(a.seq||0);});}
  var dates=Object.keys(g).sort(function(a,c){return c.localeCompare(a);});

  var catOpts='<option value=""'+(qaSelVal===''?' selected':'')+'>Дневные расходы</option>';

    var p=b.planned[pi],rem=calcCatRem(b,p.id);

  var dLbl=qaDate==='today'?'Сегодня':qaDate==='yesterday'?'Вчера':(qaCustom?fmtSh(qaCustom):'Дата');

        (qaDate!=='today'?'<span>'+dLbl+'</span>':'')+
      '</button>'+
      '<button type="button" class="qa-go" onclick="doQA()">→</button>'+
    '</div>'+
    (qaDrop?rCalPop():'')+
  '</div>';

  if(!dates.length)return h+'<div class="no-tx">Расходов пока нет — хорошее начало 👏</div>';
  for(var di2=0;di2<dates.length;di2++){

    h+='<div class="dg"><div class="dh"><span class="dt">'+fmtDay(date)+'</span><span class="ds">'+fmt(sum)+'</span></div>';
    for(var ti2=0;ti2<dt.length;ti2++){
      var t2=dt[ti2];

        '<div class="txi">'+

          (t2.category?'<div class="txc">'+(t2.categoryEmoji?t2.categoryEmoji+' ':'')+esc(t2.category)+'</div>':'')+
        '</div>'+
        '<div class="txa">'+fmt(t2.amount)+'</div>'+
        '<div class="txd"><div class="ctx-wrap">'+
          '<button type="button" class="dots" onclick="togMenu(\'tx\',\''+t2.id+'\',event)">•••</button>'+
          (txMenu===t2.id?'<div class="ctx" onclick="event.stopPropagation()">'+
            '<button onclick="editTx(\''+t2.id+'\')">Редактировать</button>'+
            '<button class="del" onclick="delTx(\''+t2.id+'\')">Удалить</button>'+
          '</div>':'')+

/* ── PLANNED PREVIEW ─────────────────────────── */
function updPlnPrev(rawVal){
  var el=document.getElementById('pln-prev');if(!el)return;
  var ti=0;for(var i=0;i<_pc.inc.length;i++)ti+=_pc.inc[i].amount;
  var tp=0;for(var j=0;j<_pc.pln.length;j++){if(_pc.pln[j].id!==_pc.eid)tp+=_pc.pln[j].amount;}
  var newAmt=pf(rawVal);tp+=newAmt;
  var newD=Math.max(0,(ti-tp)/_pc.days),diff=newD-_pc.curD;
  var col=diff>=0?'var(--gd)':'var(--rd)';
  el.innerHTML='Дневной бюджет: <b>'+fmt(newD)+'</b> <span style="color:'+col+';">'+(diff>=0?'+':'−')+fmt(Math.abs(diff))+'/день</span>';
}

/* ── TRANSFER PREVIEW ────────────────────────── */
function updTrPrev(){
  var el=document.getElementById('tr-prev');if(!el)return;
  var fid=(document.getElementById('mf')||{}).value||'';
  var tid=(document.getElementById('mt')||{}).value||'';
  var amt=pf((document.getElementById('ma')||{}).value);
  if(!amt||fid===tid){el.innerHTML='';return;}
  function getRem(id){
    if(!id)return _trCtx.dayBal;
    var a=_trCtx.pln.filter(function(p){return p.id===id;});if(!a.length)return 0;
    var sp=0;for(var i=0;i<S.txs.length;i++){var tx=S.txs[i];if(tx.budgetId===_trCtx.bid&&tx.plannedCatId===id)sp+=tx.amount;}
    return a[0].amount-sp;
  }
  function getName(id){
    if(!id)return 'Дневной бюджет';
    var a=_trCtx.pln.filter(function(p){return p.id===id;});return a.length?(a[0].emoji||'')+' '+a[0].name:'';
  }
  var fC=getRem(fid),fN=fC-amt,tC=getRem(tid),tN=tC+amt;
  var rows='<div class="trprow"><span>'+esc(getName(fid))+'</span><span>'+fmt(fC)+' → <b style="color:'+(fN<0?'var(--rd)':'var(--gd)')+'">'+fmt(fN)+'</b></span></div>';
  rows+='<div class="trprow"><span>'+esc(getName(tid))+'</span><span>'+fmt(tC)+' → <b style="color:'+(tN<0?'var(--rd)':'var(--gd)')+'">'+fmt(tN)+'</b></span></div>';
  el.innerHTML='<div class="trpbox">'+rows+'</div>';
}

/* ── WIZARD ──────────────────────────────────── */
function initWD(){
  var now=new Date(),y=now.getFullYear(),m=now.getMonth();
  if(S.budgets.length>0){m++;if(m>11){m=0;y++;}}
  var last=S.budgets.length?S.budgets[S.budgets.length-1]:null;
  var inc=last?last.incomes.map(function(i){return{id:uid(),name:i.name,emoji:i.emoji,amount:''};}) :[];
  var pln=last?last.planned.map(function(p){return{id:uid(),name:p.name,emoji:p.emoji,amount:''};}) :[{id:uid(),name:'Непредвиденные расходы',emoji:'✨',amount:''}];
  if(!pln.filter(function(p){return p.name==='Непредвиденные расходы';}).length)
    pln.unshift({id:uid(),name:'Непредвиденные расходы',emoji:'✨',amount:''});
  return{dateFrom:firstDOM(y,m),dateTo:lastDOM(y,m),showDates:false,incomes:inc,planned:pln};
}

function wdTP(){var t=0;for(var i=0;i<wd.planned.length;i++)t+=pf(wd.planned[i].amount)||0;return t;}

function rWz0(){
  var d=wd,ti=wdTI();
  var pk={};for(var pi=0;pi<d.incomes.length;pi++)pk[d.incomes[pi].name]=true;
  var chips='';for(var ci=0;ci<IC.length;ci++)chips+='<button type="button" class="chip'+(pk[IC[ci].n]?' pkd':'')+'" onclick="wzTI(\''+esc(IC[ci].e)+'\',\''+esc(IC[ci].n)+'\')">'+IC[ci].e+' '+IC[ci].n+'</button>';
  var rows='';
  for(var ri=0;ri<d.incomes.length;ri++){
    var r=d.incomes[ri];
    rows+='<tr><td colspan="3"><div class="wri">'+
      '<input class="wem" value="'+esc(r.emoji||'💰')+'" oninput="wf(\'inc\','+ri+',\'emoji\',this.value)" maxlength="4">'+
      '<input class="wnm" value="'+esc(r.name)+'" placeholder="Название" oninput="wf(\'inc\','+ri+',\'name\',this.value)">'+
    '</div></td>'+
    '<td><input class="wam" type="text" inputmode="decimal" value="'+(r.amount||'')+'" placeholder="0" oninput="fmtInp(this);wf(\'inc\','+ri+',\'amount\',pf(this.value));updIT()"></td>'+
    '<td><button type="button" class="wdl" onclick="wzDI('+ri+')">×</button></td></tr>';
  }
  return '<div class="hdr"><div class="hdr-r1"><div class="logo">✦ <span>Б</span>юджет</div></div></div>'+
  '<div class="wz"><div class="wzstar">✦</div><div class="wztt">Деньги</div>'+
  '<ul class="wzdc"><li><span style="color:var(--gd)">✓</span>Зарплата, авансы, остатки на картах.</li><li><span style="color:var(--rd)">✗</span>Депозиты и резервные счета.</li></ul>'+
  '<div class="wzcard">'+
    '<div class="wzper">🗓 <b>'+fmtSh(d.dateFrom)+' — '+fmtSh(d.dateTo)+'</b> · '+getDays(d.dateFrom,d.dateTo)+' дней · <button type="button" class="wzpb" onclick="wzTD()">Изменить</button></div>'+
    (d.showDates?'<div class="ir mb12"><div class="f"><label>С</label><input class="inp" type="date" id="wz-f" value="'+d.dateFrom+'" onchange="wzDts()"></div><div class="f"><label>По</label><input class="inp" type="date" id="wz-t" value="'+d.dateTo+'" onchange="wzDts()"></div></div>':'')+
    '<div class="chips">'+chips+'</div>'+
    '<table class="wt"><thead><tr><th colspan="3">Статья дохода</th><th>Сумма</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<button type="button" class="wzadd" onclick="wzAI()">+ Добавить</button>'+
    '<div class="wztot"><span>Итого:</span><span class="am" id="wz-it">'+fmt(ti)+'</span></div>'+
  '</div>'+
  '<div class="wznav"><span></span><button type="button" id="wz-next0" class="btn bp" onclick="wzN(0)"'+(ti>0?'':' disabled')+'>Продолжить →</button></div></div>';
}

  return '<div class="hdr"><div class="hdr-r1"><div class="logo">✦ <span>Б</span>юджет</div></div></div>'+

/* ── BINDINGS ────────────────────────────────── */
function bindEmpty(){window.startWz=function(){tab='wizard';wizStep=0;wd=initWD();render();};}

function bindMain(b){
  window.setTab    =function(t){tab=t;drop=false;render();};
  window.togDrop   =function(){drop=!drop;usrMenu=false;txMenu=null;incMenu=null;plnMenu=null;render();};
  window.togUsr    =function(){usrMenu=!usrMenu;drop=false;txMenu=null;incMenu=null;plnMenu=null;render();};
  window.closeBk   =function(){drop=false;usrMenu=false;txMenu=null;incMenu=null;plnMenu=null;render();};
  window.closeModal=function(){modal=null;render();};
  window.ovClick   =function(e){if(e.target.classList.contains('overlay'))closeModal();};
  window.swBdg     =function(id){S.activeBudgetId=id;save();drop=false;render();};
  window.goCurrent =function(){var cb=getCurrentBudget();if(cb){S.activeBudgetId=cb.id;save();drop=false;render();}};
  window.newBdg    =function(){drop=false;tab='wizard';wizStep=0;wd=initWD();render();};
  window.openBdgEdit=function(){drop=false;modal={type:'budget-edit',data:{dateFrom:b.dateFrom,dateTo:b.dateTo}};render();};
  window.saveBdgDates=function(){
    var f=(document.getElementById('be-from')||{}).value, t=(document.getElementById('be-to')||{}).value;
    if(!f||!t){alert('Укажи обе даты');return;}
    if(f>t){alert('Дата начала позже даты конца');return;}
    b.dateFrom=f;b.dateTo=t;recalcDaily(b);save();modal=null;render();
  };
  window.delBdg=function(id){
    if(S.budgets.length<=1){alert('Нельзя удалить единственный бюджет');return;}
    if(!confirm('Удалить этот бюджет и все его траты? Действие необратимо.'))return;
    S.budgets=S.budgets.filter(function(x){return x.id!==id;});
    S.txs=S.txs.filter(function(t){return t.budgetId!==id;});
    if(S.activeBudgetId===id)S.activeBudgetId=S.budgets[S.budgets.length-1].id;
    drop=false;save();render();
  };

  window.togMenu=function(kind,id,e){
    e.stopPropagation();
    var wt=txMenu===id,wi=incMenu===id,wp=plnMenu===id;
    txMenu=null;incMenu=null;plnMenu=null;drop=false;
    if(kind==='tx'&&!wt)txMenu=id;
    if(kind==='inc'&&!wi)incMenu=id;
    if(kind==='pln'&&!wp)plnMenu=id;
    render();
  };

  function gQV(){return(document.getElementById('qa-inp')||{}).value||qaVal||'';}
  function rQV(v){qaVal=v;var el=document.getElementById('qa-inp');if(el)el.value=v;}
  window.togCal    =function(e){e.stopPropagation();var v=gQV();qaDrop=!qaDrop;render();rQV(v);};
  window.closeQaCal=function(){var v=gQV();qaDrop=false;render();rQV(v);};
  window.setQD     =function(v){var sv=gQV();qaDate=v;qaDrop=false;render();rQV(sv);};
  window.pickDay   =function(ds){var sv=gQV();qaCustom=ds;qaDate='custom';qaDrop=false;render();rQV(sv);};

  window.doQA=function(){
    var raw=((document.getElementById('qa-inp')||{}).value||qaVal||'').trim();
    qaVal=raw;
    var p=parseQA(raw);if(!p||!p.amount)return;
    var useDate=today();
    if(qaDate==='yesterday')useDate=yesterday();
    else if(qaDate==='custom'&&qaCustom)useDate=qaCustom;
    var cat='',cate='',pcid=null;
    if(qaSelVal&&qaSelVal.startsWith('p:')){
      pcid=qaSelVal.slice(2);
      var fc=b.planned.filter(function(x){return x.id===pcid;});
      if(fc.length){cat=fc[0].name;cate=fc[0].emoji||'📌';}
    }
    S.txs.push({id:uid(),seq:Date.now(),date:useDate,name:p.name,category:cat,categoryEmoji:cate,plannedCatId:pcid,amount:p.amount,budgetId:b.id});
    qaVal='';qaSelVal='';/* сброс на «Дневные расходы» — как в Sintra */
    save();render();
  };

  window.om=function(type){
    if(type==='add-planned')_pc={inc:b.incomes,pln:b.planned,eid:'__new__',days:getDays(b.dateFrom,b.dateTo),curD:b.dailyBudget};
    modal={type:type,data:null};render();
  };

  window.fillSg=function(eid,ev,nid,nv){var a=document.getElementById(eid),c=document.getElementById(nid);if(a)a.value=ev;if(c)c.value=nv;};

  window.editInc=function(id){var i=b.incomes.filter(function(x){return x.id===id;})[0];incMenu=null;modal={type:'edit-income',data:Object.assign({},i)};render();};
  window.delInc =function(id){if(!confirm('Удалить?'))return;incMenu=null;b.incomes=b.incomes.filter(function(i){return i.id!==id;});recalcDaily(b);save();modal=null;render();};
  window.saveInc=function(){
    var n=((document.getElementById('mn')||{}).value||'').trim();
    var a=pf((document.getElementById('ma')||{}).value);
    var e=((document.getElementById('me')||{}).value||'💰').trim();
    if(!n||!a)return;
    if(modal.type==='add-income')b.incomes.push({id:uid(),name:n,emoji:e,amount:a});
    else{var inc=b.incomes.filter(function(x){return x.id===modal.data.id;})[0];if(inc){inc.name=n;inc.emoji=e;inc.amount=a;}}
    recalcDaily(b);save();modal=null;render();
  };

  window.editPln=function(id){
    var p=b.planned.filter(function(x){return x.id===id;})[0];plnMenu=null;
    _pc={inc:b.incomes,pln:b.planned,eid:id,days:getDays(b.dateFrom,b.dateTo),curD:b.dailyBudget};
    modal={type:'edit-planned',data:Object.assign({},p)};render();
  };
  window.delPln=function(id){
    /* Считаем привязанные траты — они станут дневными, иначе сломается баланс */
    var linked=S.txs.filter(function(t){return t.budgetId===b.id&&t.plannedCatId===id;});
    var msg=linked.length
      ?'Удалить категорию? '+linked.length+' трат(ы) перейдут в «Дневные расходы».'
      :'Удалить категорию?';
    if(!confirm(msg))return;
    plnMenu=null;
    for(var i=0;i<S.txs.length;i++){
      var t=S.txs[i];
      if(t.budgetId===b.id&&t.plannedCatId===id){t.plannedCatId=null;t.category='';t.categoryEmoji='';}
    }
    b.planned=b.planned.filter(function(p){return p.id!==id;});
    recalcDaily(b);save();modal=null;render();
  };
  window.savePln=function(){
    var n=((document.getElementById('mn')||{}).value||'').trim();
    var a=pf((document.getElementById('ma')||{}).value);
    var e=((document.getElementById('me')||{}).value||'✨').trim();
    if(!n||!a)return;
    if(modal.type==='add-planned')b.planned.push({id:uid(),name:n,emoji:e,amount:a});
    else{var pl=b.planned.filter(function(x){return x.id===modal.data.id;})[0];if(pl){pl.name=n;pl.emoji=e;pl.amount=a;}}
    recalcDaily(b);save();modal=null;render();
  };

  window.openTr=function(fromId){
    plnMenu=null;
    var rem=calcCatRem(b,fromId),isOv=rem<0;
    var data=isOv
      ?{toId:fromId,preAmt:Math.abs(rem)}   // category is "to" (receiver), prefill deficit
      :{fromId:fromId,toId:'',preAmt:0};    // normal: category is "from"
    modal={type:'transfer',data:data};render();
  };
  window.doTr=function(){
    var errEl=document.getElementById('tr-err');
    function err(m){if(errEl)errEl.textContent=m;}
    var a=pf((document.getElementById('ma')||{}).value);
    if(!a)return err('Укажи сумму перевода');
    var fid=(document.getElementById('mf')||{}).value||'';
    var tid=(document.getElementById('mt')||{}).value||'';
    if(fid===tid)return err('Источник и получатель совпадают');
    /* Валидация источника:
       - Дневной бюджет (fid==='') — переводить можно всегда. Деньги берутся из
         месячного распределения, минус на сегодня не блокирует. Дневная норма
         пересчитается автоматически после перевода.
       - Категория (fid!=='') — только в пределах её положительного остатка. */
    if(fid){
      var rem=calcCatRem(b,fid);
      if(rem<=0)return err('В категории нет свободных средств');
      if(a>rem)return err('В категории только '+fmt(rem)+' — перевести '+fmt(a)+' нельзя');
    }
    if(fid){var cf=b.planned.filter(function(p){return p.id===fid;})[0];if(cf)cf.amount-=a;}
    if(tid){var ct=b.planned.filter(function(p){return p.id===tid;})[0];if(ct)ct.amount+=a;}
    recalcDaily(b);save();modal=null;render();
  };

  window.editTx=function(id){var tx=S.txs.filter(function(t){return t.id===id;})[0];txMenu=null;if(tx){modal={type:'edit-tx',data:Object.assign({},tx)};render();}};
  window.delTx =function(id){if(!confirm('Удалить трату?'))return;S.txs=S.txs.filter(function(t){return t.id!==id;});txMenu=null;save();modal=null;render();};
  window.saveTx=function(id){
    var tx=S.txs.filter(function(t){return t.id===id;})[0];if(!tx)return;
    tx.name=((document.getElementById('mn')||{}).value||'').trim()||tx.name;
    tx.amount=pf((document.getElementById('ma')||{}).value)||tx.amount;
    tx.date=(document.getElementById('md')||{}).value||tx.date;
    var cv=(document.getElementById('mc2')||{}).value||'';
    if(cv.startsWith('p:')){
      tx.plannedCatId=cv.slice(2);
      var c2=b.planned.filter(function(p){return p.id===tx.plannedCatId;})[0];
      if(c2){tx.category=c2.name;tx.categoryEmoji=c2.emoji||'📌';}
    }else{tx.plannedCatId=null;tx.category='';tx.categoryEmoji='';}
    save();modal=null;render();
  };

  setTimeout(function(){
    var qa=document.getElementById('qa-inp');
    if(qa)qa.addEventListener('keydown',function(e){if(e.key==='Enter')window.doQA();});
  },20);
}

function bindWiz(){
  window.wzTD =function(){wd.showDates=!wd.showDates;render();};
  window.wzDts=function(){
    var f=(document.getElementById('wz-f')||{}).value,t=(document.getElementById('wz-t')||{}).value;
    if(f)wd.dateFrom=f;if(t)wd.dateTo=t;render();
  };
  window.wzTI =function(e,n){var i=wd.incomes.findIndex(function(x){return x.name===n;});if(i>=0)wd.incomes.splice(i,1);else wd.incomes.push({id:uid(),name:n,emoji:e,amount:''});render();};
  window.wzTP =function(e,n){var i=wd.planned.findIndex(function(x){return x.name===n;});if(i>=0)wd.planned.splice(i,1);else wd.planned.push({id:uid(),name:n,emoji:e,amount:''});render();};
  window.wzAI =function(){wd.incomes.push({id:uid(),name:'',emoji:'💰',amount:''});render();};
  window.wzAP =function(){wd.planned.push({id:uid(),name:'',emoji:'✨',amount:''});render();};
  window.wzDI =function(i){wd.incomes.splice(i,1);render();};
  window.wzDP =function(i){wd.planned.splice(i,1);render();};
  window.wf   =function(arr,i,key,val){if(arr==='inc'&&wd.incomes[i])wd.incomes[i][key]=val;if(arr==='pln'&&wd.planned[i])wd.planned[i][key]=val;};
  window.updIT=function(){var ti=wdTI();var el=document.getElementById('wz-it');if(el)el.textContent=fmt(ti);var btn=document.getElementById('wz-next0');if(btn)btn.disabled=!(ti>0);};
  window.updPT=function(){
    var tp=wdTP(),ti=wdTI(),avail=ti-tp,days=getDays(wd.dateFrom,wd.dateTo),daily=avail>0?avail/days:0;
    var el=document.getElementById('wz-pt');if(el)el.textContent=fmt(tp);
    var dl=document.getElementById('wz-dl');if(dl)dl.textContent=fmt(daily)+'/день';
  };
  window.wzN=function(step){
    if(step===0){
      var ti=wdTI(),pct=Math.round(ti*0.1);
      var ui=wd.planned.findIndex(function(p){return p.name==='Непредвиденные расходы';});
      if(ui>=0){if(!wd.planned[ui].amount||wd.planned[ui].amount===0)wd.planned[ui].amount=pct;}
      else wd.planned.unshift({id:uid(),name:'Непредвиденные расходы',emoji:'✨',amount:pct});
    }
    wizStep=step+1;render();
  };
  window.wzCr=function(){
    var d=wd,ti=wdTI(),tp=wdTP(),avail=ti-tp,days=getDays(d.dateFrom,d.dateTo);
    var bdg={id:uid(),dateFrom:d.dateFrom,dateTo:d.dateTo,createdAt:today(),
      incomes:d.incomes.map(function(i){return Object.assign({},i,{amount:pf(i.amount)||0});}),
      planned:d.planned.map(function(p){return Object.assign({},p,{amount:pf(p.amount)||0});}),
      dailyBudget:avail>0?avail/days:0};
    S.budgets.push(bdg);S.activeBudgetId=bdg.id;save();tab='history';wd=null;render();
  };
}

/* ── START ── */
initApp();


</script>
